<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Nav</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-icon">...</div>
    <ul>
      <li>Home</li>
      <li><a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">About</a></li>
      <li><a href="https://www.youtube.com/watch?v=ZZ5LpwO-An4" target="_blank">Contact</a></li>
    </ul>
  </nav>
  <section>
    <div>
      <div class="page-title">
        <h1>Hello! Welcome to my project</h1>
        <h2>Just dusting off the ol JS/CSS/HTML skillz</h2>
        <span>Sit back and enjoy an endless stream of cat content!</span>
      </div>
      <div class="cat-slide-container">
        <img class="cat-slides" src="" alt="an adorable cat">
      </div>
    </div>
    <div class="weather">
      <h2>How's the weather up there?</h2>
      <div class="weather-input">
        <input type="text" placeholder="Your location">
        <button>Go</button>
      </div>
      <div class="your-weather">
        <div class="current-weather"></div>
        <div class="past-weather"></div>
      </div>
    </div>
  </section>
  <script src="app.js" type="module"></script>
</body>
</html>
